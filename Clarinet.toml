[project]
name = 'accrue-btc'
description = 'AccrueBTC - non-custodial sBTC yield vault on Stacks'
authors = []
telemetry = false
cache_dir = './.cache'
requirements = [
  # Simnet/Devnet addresses (Clarinet auto-remaps for testnet/mainnet deployment)
  # Testnet SIP-010 trait: ST1NXBK3K5YYMD6FD41MVNP3JS1GABZ8TRVX023PT.sip-010-trait-ft-standard
  { contract_id = 'SP3FBR2AGK5H9QBDH3EEN6DF8EK8JY7RX8QJ5SVTE.sip-010-trait-ft-standard' },
  # Testnet sBTC token:    ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT.sbtc-token
  { contract_id = 'SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-token' }
]

[contracts.vault-trait]
path = 'contracts/vault-trait.clar'
clarity_version = 4
epoch = 'latest'

[contracts.vault-token]
path = 'contracts/vault-token.clar'
clarity_version = 4
epoch = 'latest'

[contracts.accrue-vault]
path = 'contracts/accrue-vault.clar'
clarity_version = 4
epoch = 'latest'
[repl.analysis]
passes = ['check_checker']

[repl.analysis.lints]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = true

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'
